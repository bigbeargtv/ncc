<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Thư Mời – NCC Club</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'MillerBanner';
  src: url('SVN-Miller Banner.ttf') format('truetype'),
       url('SVN-Miller Banner.otf') format('opentype');
}
:root { --gold:#c9a84c; --gold-light:#f0d080; }
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { background:#0f0f0f; display:flex; flex-direction:column; align-items:center; min-height:100vh; }

/* Wrapper */
.wrap {
  width:100%; max-width:680px;
  display:flex; flex-direction:column; align-items:center;
  padding:24px 20px 40px;
  gap:14px;
}

/* Canvas container – interactive overlay */
.canvas-wrap {
  position:relative;
  width:100%;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.7);
  cursor:pointer;
}
#bannerCanvas {
  display:block; width:100%; height:auto;
  touch-action:none;
}

/* Tap hints that appear on canvas */
.tap-hint {
  position:absolute;
  pointer-events:none; /* NEVER block touch/mouse */
  display:flex; align-items:center; justify-content:center;
  opacity:0;
  transition:opacity .3s;
  border-radius:50%;
  border:2px dashed rgba(201,168,76,.6);
  background:rgba(0,0,0,.35);
  color:#f0d080;
  font-family:'Be Vietnam Pro',sans-serif;
  font-size:12px; font-weight:600;
  text-align:center; line-height:1.4;
}
.tap-hint.visible { opacity:1; }

/* Hidden file input */
#avatarInput { display:none; }

/* Name inline editor popup */
.name-popup {
  display:none;
  position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,.7);
  align-items:flex-end; justify-content:center;
  padding-bottom:env(safe-area-inset-bottom, 16px);
}
.name-popup.open { display:flex; }
.name-sheet {
  background:#1a1a1a;
  border:1px solid #2a2a2a;
  border-radius:20px 20px 0 0;
  padding:24px 20px 32px;
  width:100%; max-width:480px;
  display:flex; flex-direction:column; gap:14px;
}
.name-sheet-title {
  font-family:'MillerBanner','Playfair Display',serif;
  font-size:16px; color:var(--gold-light);
  text-align:center;
}
.name-sheet input {
  width:100%; background:#111;
  border:1.5px solid #333; border-radius:10px;
  color:#e0d8c8; font-family:'Be Vietnam Pro',sans-serif;
  font-size:18px; padding:14px 16px;
  outline:none; transition:border-color .2s;
}
.name-sheet input:focus { border-color:var(--gold); }
.name-sheet-btns { display:flex; gap:10px; }
.btn-cancel {
  flex:1; background:transparent;
  border:1px solid #333; border-radius:10px;
  color:#777; font-family:'Be Vietnam Pro',sans-serif;
  font-size:15px; padding:13px; cursor:pointer;
}
.btn-ok {
  flex:2;
  background:linear-gradient(135deg,#c9a84c,#f0d080,#c9a84c);
  background-size:200%;
  border:none; border-radius:10px;
  color:#111; font-family:'Be Vietnam Pro',sans-serif;
  font-size:15px; font-weight:700; padding:13px;
  cursor:pointer; animation:shimmer 3s ease infinite;
}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

/* Zoom bar – appears after photo chosen */
.zoom-bar {
  width:100%; display:none;
  align-items:center; gap:12px;
  background:#1a1a1a; border:1px solid #2a2a2a;
  border-radius:12px; padding:12px 16px;
}
.zoom-bar.visible { display:flex; }
.zoom-bar span { font-size:13px; color:#666; white-space:nowrap; }
.zoom-bar span b { color:var(--gold); }
.zoom-bar input[type=range] { flex:1; accent-color:var(--gold); height:20px; cursor:pointer; }
.btn-change-photo {
  background: rgba(201,168,76,.15);
  border: 1px solid rgba(201,168,76,.4);
  border-radius: 8px;
  color: var(--gold-light);
  font-family: 'Be Vietnam Pro', sans-serif;
  font-size: 13px; font-weight: 600;
  padding: 7px 12px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.btn-change-photo:active { background: rgba(201,168,76,.3); }

/* Download button */
.btn-download {
  width:100%;
  background:transparent;
  border:1.5px solid var(--gold);
  border-radius:12px;
  color:var(--gold-light);
  font-family:'Be Vietnam Pro',sans-serif;
  font-size:16px; font-weight:600;
  padding:15px;
  cursor:pointer;
  transition:background .2s, color .2s;
}
.btn-download:active { background:var(--gold); color:#111; }
.btn-download:disabled { opacity:.3; pointer-events:none; }

/* Loading */
#loading { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:200; align-items:center; justify-content:center; flex-direction:column; gap:14px; }
#loading.show { display:flex; }
.spinner { width:46px; height:46px; border:3px solid #333; border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
.loading-text { color:var(--gold); font-size:14px; }
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="wrap">

  <!-- CANVAS -->
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="bannerCanvas" width="900" height="1200"></canvas>
    <!-- Tap hints overlaid on canvas (positioned by JS) -->
    <div class="tap-hint" id="hintAvatar">📷<br>Tap để<br>chọn ảnh</div>
    <div class="tap-hint" id="hintText">✏️<br>Tap để<br>nhập tên</div>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="avatarInput" accept="image/*">

  <!-- Zoom + đổi ảnh (shows after photo chosen) -->
  <div class="zoom-bar" id="zoomBar">
    <button class="btn-change-photo" onclick="document.getElementById('avatarInput').click()">📷 Đổi ảnh</button>
    <input type="range" id="zoomSlider" min="0.1" max="4" step="0.01" value="1">
    <span><b id="zoomVal">100%</b></span>
    <button class="btn-change-photo" onclick="resetZoom()" title="Reset zoom">↺</button>
  </div>

  <!-- Download -->
  <button class="btn-download" id="dlBtn" onclick="downloadBanner()" disabled>⬇ Tải ảnh về</button>

</div>

<!-- Name popup sheet -->
<div class="name-popup" id="namePopup">
  <div class="name-sheet">
    <div class="name-sheet-title">Nhập tên người nhận</div>
    <input type="text" id="nameInput" placeholder="Mr Bigbear" autocomplete="off" autocorrect="off">
    <div class="name-sheet-btns">
      <button class="btn-cancel" onclick="closeNamePopup()">Huỷ</button>
      <button class="btn-ok" onclick="confirmName()">✓ Xác nhận</button>
    </div>
  </div>
</div>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Đang xuất…</div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const BANNER_SRC    = 'banner-bg.png';
const CX_R = 0.500, CY_R = 0.432, CR_R = 0.195;
const NAME_X_R = 0.5, NAME_Y_R = 0.268;
const FONT_SIZE = 30; // fixed font size

// ── STATE ───────────────────────────────────────────────────
let bgImage = null, avatarImage = null;
let avZoom = 1, avOffX = 0, avOffY = 0;
let currentName = '';
let dragMode = null;
let dragSX = 0, dragSY = 0, dragSAX = 0, dragSAY = 0;
let pinchDist0 = 0, pinchZoom0 = 1;
let hintsShown = true;

const canvas  = document.getElementById('bannerCanvas');
const ctx     = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const CX = W * CX_R, CY = H * CY_R, CR = W * CR_R;
const NAME_X = W * NAME_X_R, NAME_Y = H * NAME_Y_R;

// ── POSITION HINTS OVER CANVAS ──────────────────────────────
function positionHints() {
  const wrap = document.getElementById('canvasWrap');
  const scale = wrap.clientWidth / W;

  const hA = document.getElementById('hintAvatar');
  const d = CR * 2 * scale;
  hA.style.width  = d + 'px';
  hA.style.height = d + 'px';
  hA.style.left   = (CX * scale - d/2) + 'px';
  hA.style.top    = (CY * scale - d/2) + 'px';

  const hT = document.getElementById('hintText');
  const tw = W * 0.6 * scale, th = 36 * scale;
  hT.style.width  = tw + 'px';
  hT.style.height = th + 'px';
  hT.style.borderRadius = '6px';
  hT.style.left   = (NAME_X * scale - tw/2) + 'px';
  hT.style.top    = ((NAME_Y - FONT_SIZE) * scale) + 'px';
}

function showHints() {
  if (!avatarImage) document.getElementById('hintAvatar').classList.add('visible');
  // chỉ show text hint khi chưa có tên VÀ chưa có ảnh (tránh rối)
  if (!currentName && !avatarImage) document.getElementById('hintText').classList.add('visible');
}
function hideHints() {
  document.getElementById('hintAvatar').classList.remove('visible');
  document.getElementById('hintText').classList.remove('visible');
}
function hideAvatarHint() {
  // Ẩn vĩnh viễn hint avatar sau khi đã chọn ảnh
  document.getElementById('hintAvatar').classList.remove('visible');
  document.getElementById('hintAvatar').style.display = 'none';
}

window.addEventListener('resize', positionHints);

// ── LOAD BG ─────────────────────────────────────────────────
function loadBg() {
  return new Promise(r => {
    const img = new Image();
    img.onload = () => { bgImage = img; r(); };
    img.onerror = () => r();
    img.src = BANNER_SRC;
  });
}

// ── CANVAS TAP: route to avatar or text ─────────────────────
canvas.addEventListener('click', e => {
  if (hasDragged) return;
  const p = getPos(e);
  if (inCircle(p.x, p.y)) {
    // Chỉ mở chọn ảnh khi chưa có ảnh (sau đó dùng nút "Đổi ảnh")
    if (!avatarImage) document.getElementById('avatarInput').click();
  } else if (inTextZone(p.x, p.y)) {
    openNamePopup();
  }
});

// ── AVATAR INPUT ────────────────────────────────────────────
document.getElementById('avatarInput').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    avatarImage = img;
    avZoom = (CR * 2) / Math.min(img.naturalWidth, img.naturalHeight);
    avOffX = 0; avOffY = 0;
    document.getElementById('zoomSlider').value = avZoom;
    updateZoomLabel();
    document.getElementById('zoomBar').classList.add('visible');
    hideAvatarHint(); // ẩn vĩnh viễn, không bao giờ show lại
    draw();
  };
  img.src = url;
});

// ── ZOOM ────────────────────────────────────────────────────
document.getElementById('zoomSlider').addEventListener('input', function() {
  avZoom = parseFloat(this.value); updateZoomLabel(); draw();
});
function resetZoom() {
  if (!avatarImage) return;
  const minSide = Math.min(avatarImage.naturalWidth, avatarImage.naturalHeight);
  avZoom = (CR * 2) / minSide;
  avOffX = 0; avOffY = 0;
  document.getElementById('zoomSlider').value = avZoom;
  updateZoomLabel(); draw();
}

function updateZoomLabel() {
  document.getElementById('zoomVal').textContent = Math.round(avZoom * 100) + '%';
}

// ── NAME POPUP ──────────────────────────────────────────────
function openNamePopup() {
  document.getElementById('nameInput').value = currentName;
  document.getElementById('namePopup').classList.add('open');
  setTimeout(() => document.getElementById('nameInput').focus(), 100);
}
function closeNamePopup() {
  document.getElementById('namePopup').classList.remove('open');
}
function confirmName() {
  currentName = document.getElementById('nameInput').value.trim();
  closeNamePopup();
  if (currentName) document.getElementById('hintText').classList.remove('visible');
  else document.getElementById('hintText').classList.add('visible');
  draw();
}
// Enter key confirms
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmName();
});
// Tap outside sheet closes
document.getElementById('namePopup').addEventListener('click', e => {
  if (e.target === document.getElementById('namePopup')) closeNamePopup();
});

// ── HIT ZONES ───────────────────────────────────────────────
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return { x:(src.clientX - rect.left)*sx, y:(src.clientY - rect.top)*sy };
}
function inCircle(x, y)  { return Math.hypot(x - CX, y - CY) <= CR + 10; }
function inTextZone(x, y) {
  const zw = W * 0.7, zh = FONT_SIZE * 2.5;
  return x >= NAME_X - zw/2 && x <= NAME_X + zw/2 &&
         y >= NAME_Y - zh   && y <= NAME_Y + 10;
}

// ── DRAG (avatar only) ───────────────────────────────────────
let tappedCircle = false;
let hasDragged = false; // phân biệt tap vs drag

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    // 2 ngón → pinch, huỷ drag 1 ngón nếu có
    tappedCircle = false; hasDragged = false;
    startPinch(e);
    return;
  }
  if (e.touches.length === 1) onPointerDown(e);
}, { passive:true });

function onPointerDown(e) {
  const p = getPos(e);
  if (!avatarImage || !inCircle(p.x, p.y)) return;
  dragMode = null;
  tappedCircle = true;
  hasDragged = false;
  dragSX = p.x; dragSY = p.y; dragSAX = avOffX; dragSAY = avOffY;
  document.getElementById('hintText').classList.remove('visible');
}

window.addEventListener('mousemove', onPointerMove);
window.addEventListener('touchmove', e => {
  if (e.touches.length === 2) { onPinch(e); return; }
  if (e.touches.length === 1) onPointerMove(e);
}, { passive:true });

function onPointerMove(e) {
  if (!tappedCircle) return;
  const p = getPos(e);
  const dx = p.x - dragSX, dy = p.y - dragSY;
  // Ngưỡng 8px để tránh micro-movement bị nhận là drag
  if (!hasDragged && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
    hasDragged = true;
    dragMode = 'avatar';
  }
  if (dragMode === 'avatar') {
    avOffX = dragSAX + dx; avOffY = dragSAY + dy;
    draw();
  }
}

window.addEventListener('mouseup', () => {
  tappedCircle = false;
  dragMode = null;
  hasDragged = false;
});
window.addEventListener('touchend', e => {
  if (e.touches.length === 0) {
    // Tất cả ngón tay nhấc lên
    tappedCircle = false;
    dragMode = null;
    hasDragged = false;
    pinchDist0 = 0; // reset pinch để lần sau bắt đầu lại từ đầu
  }
});

// ── PINCH ZOOM ──────────────────────────────────────────────
function getPinchDist(e) {
  return Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY);
}
function startPinch(e) {
  if (!avatarImage) return;
  pinchDist0 = getPinchDist(e);
  pinchZoom0 = avZoom; // snapshot zoom tại thời điểm bắt đầu pinch
}
function onPinch(e) {
  if (!avatarImage || !pinchDist0) return;
  const newZoom = pinchZoom0 * (getPinchDist(e) / pinchDist0);
  avZoom = Math.min(4, Math.max(0.1, newZoom));
  document.getElementById('zoomSlider').value = avZoom;
  updateZoomLabel(); draw();
}

canvas.addEventListener('wheel', e => {
  if (!avatarImage || !inCircle(getPos(e).x, getPos(e).y)) return;
  e.preventDefault();
  avZoom = Math.min(4, Math.max(0.1, avZoom - e.deltaY * 0.0015));
  document.getElementById('zoomSlider').value = avZoom;
  updateZoomLabel(); draw();
}, { passive:false });

// ── DRAW ────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // 1. Avatar inside circle
  if (avatarImage && avatarImage.complete && avatarImage.naturalWidth > 0) {
    ctx.save();
    ctx.beginPath(); ctx.arc(CX, CY, CR, 0, Math.PI*2); ctx.clip();
    const dw = avatarImage.naturalWidth * avZoom, dh = avatarImage.naturalHeight * avZoom;
    ctx.drawImage(avatarImage, CX - dw/2 + avOffX, CY - dh/2 + avOffY, dw, dh);
    ctx.restore();
  }

  // 2. Banner overlay (PNG transparent at circle)
  if (bgImage) ctx.drawImage(bgImage, 0, 0, W, H);

  // 3. Name text
  if (currentName) drawText();

  document.getElementById('dlBtn').disabled = false;
}

function drawText() {
  const FONT = `bold ${FONT_SIZE}px 'MillerBanner','Playfair Display',serif`;
  const text = `Kính gửi: ${currentName}`;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = FONT;
  ctx.fillStyle = '#ebe6b4';
  ctx.shadowColor = 'rgba(0,0,0,.85)'; ctx.shadowBlur = 10;
  ctx.fillText(text, NAME_X, NAME_Y);
  ctx.restore();
}

// ── DOWNLOAD ────────────────────────────────────────────────
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

async function downloadBanner() {
  const loading = document.getElementById('loading');
  loading.classList.add('show');
  hideHints();
  await new Promise(r => setTimeout(r, 50));

  // Redraw clean
  ctx.clearRect(0, 0, W, H);
  if (avatarImage && avatarImage.complete) {
    ctx.save();
    ctx.beginPath(); ctx.arc(CX, CY, CR, 0, Math.PI*2); ctx.clip();
    const dw = avatarImage.naturalWidth * avZoom, dh = avatarImage.naturalHeight * avZoom;
    ctx.drawImage(avatarImage, CX - dw/2 + avOffX, CY - dh/2 + avOffY, dw, dh);
    ctx.restore();
  }
  if (bgImage) ctx.drawImage(bgImage, 0, 0, W, H);
  if (currentName) drawText();

  loading.classList.remove('show');

  if (isIOS) {
    // iOS Safari không cho download trực tiếp vào Ảnh
    // → mở ảnh tab mới, hướng dẫn người dùng giữ ngón tay để lưu
    const dataUrl = canvas.toDataURL('image/png');
    const w = window.open('', '_blank');
    w.document.write(`
      <html><head><meta name="viewport" content="width=device-width,initial-scale=1">
      <style>
        body{margin:0;background:#000;display:flex;flex-direction:column;align-items:center;font-family:sans-serif;}
        img{width:100%;max-width:600px;display:block;}
        .tip{color:#f0d080;font-size:14px;text-align:center;padding:14px 20px;line-height:1.7;background:#1a1a1a;width:100%;max-width:600px;}
      </style></head>
      <body>
        <div class="tip">👇 <b>Giữ ngón tay vào ảnh</b> → chọn <b>"Thêm vào Ảnh"</b> để lưu vào thư viện</div>
        <img src="${dataUrl}">
      </body></html>
    `);
    w.document.close();
  } else {
    // Android / Desktop → download bình thường
    const link = document.createElement('a');
    link.download = 'thu-moi-ncc-club.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  showHints();
}

// ── INIT ────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  try {
    const font = new FontFace('MillerBanner',
      "url('SVN-Miller Banner.ttf') format('truetype'), url('SVN-Miller Banner.otf') format('opentype')"
    );
    await font.load();
    document.fonts.add(font);
  } catch(e) { console.warn('Font fallback.'); }

  await loadBg();
  draw();
  positionHints();
  showHints();

  // Đổi label nút theo thiết bị
  if (isIOS) {
    document.getElementById('dlBtn').textContent = '🖼 Xem & Lưu vào Ảnh';
  }
});
</script>
</body>
</html>
